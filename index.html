<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RowCoach Pro - Daylight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=500;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            touch-action: none; 
            overflow: hidden; 
            user-select: none; 
            -webkit-user-select: none;
            background-color: #f8fafc;
            padding: max(0.75rem, env(safe-area-inset-top)) max(0.75rem, env(safe-area-inset-right)) max(0.75rem, env(safe-area-inset-bottom)) max(0.75rem, env(safe-area-inset-left));
        }
        .tabular { font-variant-numeric: tabular-nums; }
        
        .bg-grid-pattern-light {
            background-image: 
                linear-gradient(to right, rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .text-fluid-huge { font-size: clamp(3.5rem, min(16vw, 22vh), 8rem); line-height: 1; }
        .text-fluid-large { font-size: clamp(2.5rem, min(12vw, 18vh), 6.5rem); line-height: 1; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 h-dvh flex flex-col gap-2.5">

    <header class="flex justify-between items-center px-4 py-2.5 rounded-2xl bg-white/60 backdrop-blur-md border border-white shadow-sm shrink-0">
        <button type="button" id="telemetry-status" class="flex items-center gap-2 text-left bg-transparent border-0 p-0 cursor-pointer focus:outline-none">
            <div id="status-accel-dot" class="w-2.5 h-2.5 rounded-full bg-amber-400 animate-pulse shadow-[0_0_0_2px_rgba(251,191,36,0.2)]"></div>
            <div class="flex flex-col">
                <span class="text-[9px] text-slate-400 uppercase tracking-widest font-bold">Surge</span>
                <span id="debugAccel" class="text-xs font-mono text-slate-700 font-bold tabular">STANDBY</span>
            </div>
        </button>

        <!-- Mode Toggle Button -->
        <button id="btn-mode" class="flex flex-col items-center px-3 py-1 rounded-xl bg-slate-900 text-white shadow-lg active:scale-95 transition-all">
            <span class="text-[8px] uppercase tracking-widest font-black opacity-70">Sens.</span>
            <span id="mode-text" class="text-[10px] font-bold">ROBUST</span>
        </button>

        <button type="button" id="gps-status" class="flex items-center gap-2 text-right bg-transparent border-0 p-0 cursor-pointer focus:outline-none">
            <div class="flex flex-col">
                <span class="text-[9px] text-slate-400 uppercase tracking-widest font-bold">GPS</span>
                <span id="debugGPS" class="text-xs font-mono text-slate-700 font-bold tabular">SEARCHING</span>
            </div>
            <div id="status-gps-dot" class="w-2.5 h-2.5 rounded-full bg-amber-400 animate-pulse shadow-[0_0_0_2px_rgba(251,191,36,0.2)]"></div>
        </button>
    </header>

    <div class="flex-1 flex flex-col landscape:flex-row gap-2.5 min-h-0">
        <main class="flex-1 flex flex-col sm:flex-row landscape:flex-row gap-2.5 min-h-0">
            <div class="flex-1 rounded-3xl bg-white border border-slate-200 flex flex-col justify-center items-center relative overflow-hidden shadow-xl shadow-slate-200/50 p-2">
                <div class="flex flex-col items-center z-10">
                    <div class="flex items-center gap-2 mb-1">
                        <svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        <span class="text-slate-500 font-bold uppercase tracking-[0.2em] text-[10px]">Stroke Rate</span>
                    </div>
                    <span id="ui-spm" class="text-fluid-huge font-black text-slate-900 tabular tracking-tighter">00</span>
                    <span class="text-slate-400 font-extrabold tracking-widest mt-0.5 text-xs uppercase">SPM</span>
                </div>
            </div>
            
            <div class="flex-1 rounded-3xl bg-white border border-slate-200 flex flex-col justify-center items-center relative overflow-hidden shadow-xl shadow-slate-200/50 p-2">
                <div class="flex flex-col items-center z-10">
                    <div class="flex items-center gap-2 mb-1">
                        <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <span class="text-slate-500 font-bold uppercase tracking-[0.2em] text-[10px]">500m Pace</span>
                    </div>
                    <span id="ui-split" class="text-fluid-large font-black text-slate-900 tabular tracking-tighter">0:00</span>
                    <span class="text-slate-400 font-extrabold tracking-widest mt-0.5 text-xs uppercase">/ 500m</span>
                </div>
            </div>
        </main>

        <footer class="rounded-3xl bg-white border border-slate-200 overflow-hidden relative shadow-inner shrink-0 portrait:h-[20vh] portrait:min-h-[100px] landscape:w-[40%] lg:landscape:w-[30%] landscape:min-h-0">
            <div class="absolute inset-0 bg-grid-pattern-light opacity-60"></div>
            <canvas id="canvas" class="absolute inset-0 w-full h-full z-10"></canvas>
            <div class="absolute top-2 left-3 z-20 flex items-center gap-1.5 bg-white/80 px-1.5 py-0.5 rounded border border-slate-100">
                <div class="w-1.5 h-1.5 rounded-full bg-emerald-500"></div>
                <span class="text-slate-500 text-[9px] uppercase font-bold tracking-widest">Live Drive Curve</span>
            </div>
        </footer>
    </div>

    <div id="start-overlay" class="absolute inset-0 z-50 bg-slate-100/90 backdrop-blur-md flex items-center justify-center p-6">
        <button id="btn-start" class="w-full max-w-sm bg-slate-900 hover:bg-slate-800 text-white shadow-2xl shadow-slate-900/30 font-black text-xl py-6 rounded-2xl active:scale-95 transition-all uppercase tracking-widest border border-slate-700">
            Initialize Session
        </button>
    </div>

    <script>
        // [Simple1DKalman Class same as before]
        class Simple1DKalman { constructor(q=0.005, r=0.1) { this.q=q; this.r=r; this.p=1; this.x=null; } update(m) { if(this.x===null) { this.x=m; return this.x; } this.p+=this.q; const k=this.p/(this.p+this.r); this.x+=k*(m-this.x); this.p=(1-k)*this.p; return this.x; } }

        class RowingDataPipeline extends EventTarget {
            constructor() {
                super();
                this.kalman = new Simple1DKalman(0.005, 0.1);
                this.threshold = -2.0; // Default Robust
                this.lockoutMs = 1200;
                this.lastCatchTime = 0;
                this.lockedUntil = 0;
                this.lastSmoothed = null;
                this.gravityEstimate = 0;
                this.gravityAlpha = 0.8;
            }

            setSensitivity(mode) {
                // Sensitive = -1.0 (requires less force), Robust = -2.0 (requires more force)
                this.threshold = mode === 'sensitive' ? -1.0 : -2.0;
            }

            // [Rest of RowingDataPipeline methods: start, stop, sensor logic...]
            async start(force = false) {
                this.isRunning = true;
                const s = await this.startAccelerometerSensor();
                if(!s) await this.startDeviceMotionFallback();
            }
            async startAccelerometerSensor() {
                if(!('Accelerometer' in window)) return false;
                try {
                    this.sensor = new Accelerometer({frequency: 50});
                    this.sensor.addEventListener('reading', () => this.handleRawSample(this.sensor.y ?? 0));
                    this.sensor.start();
                    return true;
                } catch(e) { return false; }
            }
            async startDeviceMotionFallback() {
                if(typeof DeviceMotionEvent.requestPermission === 'function') await DeviceMotionEvent.requestPermission();
                this.motionListener = e => {
                    const raw = e.accelerationIncludingGravity || e.acceleration;
                    this.handleRawSample(raw.y);
                };
                window.addEventListener('devicemotion', this.motionListener);
            }
            handleRawSample(rawY) {
                this.gravityEstimate = (this.gravityAlpha * this.gravityEstimate) + ((1 - this.gravityAlpha) * rawY);
                const linearY = rawY - this.gravityEstimate;
                const smoothed = this.kalman.update(linearY);
                const prev = this.lastSmoothed;
                this.lastSmoothed = smoothed;
                
                this.dispatchEvent(new CustomEvent('telemetry', { detail: { smoothedAcceleration: smoothed } }));
                this.detectCatch(prev, smoothed);
            }
            detectCatch(prev, curr) {
                const now = performance.now();
                if(now < this.lockedUntil) return;
                if(prev !== null && prev > this.threshold && curr <= this.threshold) {
                    if(this.lastCatchTime > 0) {
                        const rate = Math.round(60000 / (now - this.lastCatchTime));
                        if(rate >= 12 && rate <= 50) this.emitStroke(rate);
                    }
                    this.lastCatchTime = now;
                    this.lockedUntil = now + this.lockoutMs;
                }
            }
            emitStroke(rate) { this.dispatchEvent(new CustomEvent('strokeDetected', { detail: { strokeRateSPM: rate } })); }
        }

        class SensorEngine {
            constructor() {
                this.nodes = {
                    spm: document.getElementById('ui-spm'),
                    split: document.getElementById('ui-split'),
                    btn: document.getElementById('btn-start'),
                    btnMode: document.getElementById('btn-mode'),
                    modeText: document.getElementById('mode-text'),
                    canvas: document.getElementById('canvas')
                };
                this.ctx = this.nodes.canvas.getContext('2d');
                this.state = { history: Array(225).fill(0), isRobust: true };
                this.pipeline = new RowingDataPipeline();
                this.pipeline.addEventListener('strokeDetected', e => this.nodes.spm.textContent = e.detail.strokeRateSPM);
                this.pipeline.addEventListener('telemetry', e => {
                    this.state.history.push(Math.abs(e.detail.smoothedAcceleration));
                    this.state.history.shift();
                });
                
                this.nodes.btnMode.addEventListener('click', () => {
                    this.state.isRobust = !this.state.isRobust;
                    this.pipeline.setSensitivity(this.state.isRobust ? 'robust' : 'sensitive');
                    this.nodes.modeText.textContent = this.state.isRobust ? 'ROBUST' : 'SENSITIVE';
                });
                
                // [Boot and Render loops...]
                this.nodes.btn.addEventListener('click', () => this.boot());
                this.handleResize();
                window.addEventListener('resize', () => this.handleResize());
            }
            boot() {
                document.getElementById('start-overlay').style.display = 'none';
                this.pipeline.start();
                this.renderLoop();
            }
            handleResize() {
                const dpr = window.devicePixelRatio || 1;
                this.nodes.canvas.width = this.nodes.canvas.clientWidth * dpr;
                this.nodes.canvas.height = this.nodes.canvas.clientHeight * dpr;
                this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            }
            renderLoop() {
                this.ctx.clearRect(0, 0, this.nodes.canvas.width, this.nodes.canvas.height);
                this.ctx.strokeStyle = '#10b981';
                this.ctx.lineWidth = 4;
                this.ctx.lineJoin = 'round';
                this.ctx.beginPath();
                const h = this.nodes.canvas.clientHeight;
                const scale = (h * 0.4);
                this.state.history.forEach((val, i) => {
                    const x = (i / 224) * this.nodes.canvas.clientWidth;
                    const y = (h/2) - (val * scale);
                    i === 0 ? this.ctx.moveTo(x, y) : this.ctx.lineTo(x, y);
                });
                this.ctx.stroke();
                requestAnimationFrame(() => this.renderLoop());
            }
        }
        document.addEventListener('DOMContentLoaded', () => new SensorEngine());
    </script>
</body>
</html>
